services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jb_pos_app
    env_file: .env.production
    environment:
      - REDIS_URL=redis://jb_pos_redis:6379
      - ENABLE_WORKER=false
    volumes:
      - ./prisma:/app/prisma   # persist pos.db
    networks:
      - jb-pos-network
      - proxy_net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: jb_pos_worker
    env_file: .env.production
    environment:
      - REDIS_URL=redis://jb_pos_redis:6379
      - ENABLE_WORKER=true
    volumes:
      - ./prisma:/app/prisma
    networks:
      - jb-pos-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jb_pos_redis
    volumes:
      - jb-pos-redis-data:/data
    networks:
      - jb-pos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  jb-pos-network:
    driver: bridge
  proxy_net:
    external: true
    name: proxy_net

volumes:
  jb-pos-redis-data:
