server {
    listen 80;
    server_name pos.jamesboogie.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name pos.jamesboogie.com;

    ssl_certificate /etc/letsencrypt/live/pos.jamesboogie.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pos.jamesboogie.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Block public access (internal tool)
    # Optional: uncomment to restrict by IP
    # allow 1.2.3.4;  # office IP
    # deny all;

    location / {
        proxy_pass http://jb_pos_app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}
